<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remix Station</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/spleeter@1.5.2/dist/spleeter.min.js"></script>
</head>
<body>

    <h1>Remix Station</h1>

    <input type="file" id="file-input" accept="audio/mpeg">
    <label for="file-input" class="file-label">Select MP3</label>

    <div id="remix-station">
        <div class="track">
            <label for="vocals-volume">Vocals</label>
            <input type="range" id="vocals-volume" class="volume-slider" min="0" max="1" step="0.01" value="1">
            <audio id="vocals-audio"></audio>
        </div>
        <div class="track">
            <label for="bass-volume">Bass</label>
            <input type="range" id="bass-volume" class="volume-slider" min="0" max="1" step="0.01" value="1">
            <audio id="bass-audio"></audio>
        </div>
        <div class="track">
            <label for="drums-volume">Drums</label>
            <input type="range" id="drums-volume" class="volume-slider" min="0" max="1" step="0.01" value="1">
            <audio id="drums-audio"></audio>
        </div>
        <div class="track">
            <label for="other-volume">Other</label>
            <input type="range" id="other-volume" class="volume-slider" min="0" max="1" step="0.01" value="1">
            <audio id="other-audio"></audio>
        </div>
    </div>

    <button id="play-button">Play</button>
    <button id="pause-button">Pause</button>


    <script src="script.js"></script>

</body>
</html>
