<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Mix AI</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5394413318565204"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-5394413318565204">
</head>
<body>
    <header>
        <h1>Music Mix AI</h1>
        <p>Create your own music mix with the power of AI.</p>
    </header>

    <main>
        <div class="container">
            <div class="left-column">
                <section class="song-input">
                    <h2>Add Your Songs</h2>
                    <div class="input-group">
                        <label for="song-url-1">Song 1 URL:</label>
                        <input type="url" id="song-url-1" placeholder="https://www.youtube.com/watch?v=...">
                    </div>
                    <div class="input-group">
                        <label for="song-url-2">Song 2 URL:</label>
                        <input type="url" id="song-url-2" placeholder="https://www.youtube.com/watch?v=...">
                    </div>
                    <div class="input-group">
                        <label for="mix-style">Mixing Style:</label>
                        <select id="mix-style">
                            <option value="crossfade">Crossfade</option>
                            <option value="beatmatch">Beatmatch</option>
                            <option value="remix">AI Remix</option>
                        </select>
                    </div>
                    <button id="mix-btn">Mix Music</button>
                </section>

                <section class="mix-output">
                    <h2>Your Mix</h2>
                    <div id="player-container">
                        <!-- Music player will be embedded here -->
                    </div>
                </section>
            </div>

            <div class="right-column">
                <aside class="ad-placeholder">
                    <!-- Google AdSense will be placed here -->
                    <p>AdSense Ad</p>
                </aside>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
